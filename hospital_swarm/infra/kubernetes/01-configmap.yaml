apiVersion: v1
kind: ConfigMap
metadata:
  name: hospital-swarm-config
  namespace: hospital-swarm
data:
  NEO4J_URI: "bolt://neo4j-service:7687"
  NEO4J_USER: "neo4j"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  BACKEND_CORS_ORIGINS: '["https://app.hospital-swarm.com","https://*.hospital-swarm.com"]'
  FHIR_BASE_URL: "/fhir/r4"
  ENABLE_MULTI_TENANT: "true"
  AUDIT_LOG_RETENTION_DAYS: "2190"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hospital-swarm-frontend-config
  namespace: hospital-swarm
data:
  NEXT_PUBLIC_API_URL: "https://api.hospital-swarm.com"
  NEXT_PUBLIC_FHIR_URL: "https://api.hospital-swarm.com/fhir/r4"
  NEXT_PUBLIC_OKTA_DOMAIN: ""
