apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-swarm-backend
  namespace: hospital-swarm
  labels:
    app: hospital-swarm-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hospital-swarm-backend
  template:
    metadata:
      labels:
        app: hospital-swarm-backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - hospital-swarm-backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: hospital-swarm/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: hospital-swarm-config
            - secretRef:
                name: hospital-swarm-secrets
          env:
            - name: REDIS_HOST
              value: "redis-service"
            - name: NEO4J_URI
              value: "bolt://neo4j-service:7687"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hospital-swarm-backend-service
  namespace: hospital-swarm
spec:
  selector:
    app: hospital-swarm-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
