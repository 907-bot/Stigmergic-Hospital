services:
  # Backend API
  backend:
    build: ../backend
    ports:
      - "9001:8000"
    volumes:
      - ../backend:/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=dev-secret-key-do-not-use-in-production
      - ENABLE_MULTI_TENANT=true
      - BACKEND_CORS_ORIGINS=["http://localhost:3000","http://localhost:3002","http://localhost:8000"]
      # Okta / Azure AD (set these in production)
      - OKTA_DOMAIN=
      - OKTA_CLIENT_ID=
      - OKTA_CLIENT_SECRET=
      - AZURE_TENANT_ID=
      - AZURE_CLIENT_ID=
    depends_on:
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Redis for event streaming
  redis:
    image: redis:7-alpine
    ports:
      - "6390:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Neo4j for graph database
  neo4j:
    image: neo4j:5
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - ./infra/neo4j/data:/data
      - ./infra/neo4j/logs:/logs
      - ./infra/neo4j/import:/var/lib/neo4j/import
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Frontend
  frontend:
    build: ../frontend
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:9001
    depends_on:
      backend:
        condition: service_started

volumes:
  redis_data:
