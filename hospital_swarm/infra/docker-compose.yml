version: '3.8'

services:
  # Backend API
  backend:
    build: ../backend
    ports:
      - "9001:8000"
    volumes:
      - ../backend:/app
      - ./neo4j/data:/data
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - neo4j
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis for event streaming
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Neo4j for graph database
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./infra/neo4j/data:/data
      - ./infra/neo4j/logs:/logs
      - ./infra/neo4j/import:/var/lib/neo4j/import
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true

  # Frontend
  frontend:
    build: ../frontend
    ports:
      - "3002:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:9001
    depends_on:
      - backend

volumes:
  redis_data: